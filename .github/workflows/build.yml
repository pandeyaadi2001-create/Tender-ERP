name: Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------
  # 1. Fast feedback: run the pytest suite on Linux. No GUI needed —
  #    the tests hit the service layer directly.
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run pytest
        run: python -m pytest -q

  # ------------------------------------------------------------------
  # 2. Windows .exe via PyInstaller + Inno Setup installer
  # ------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean tender_erp_win.spec
      - name: Smoke-test the built exe
        shell: pwsh
        run: |
          Test-Path dist\TenderERP\TenderERP.exe
      - name: Create distributable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\TenderERP\*" -DestinationPath "dist\TenderERP-Windows.zip" -Force
      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        run: |
          # Inno Setup is pre-installed on windows-latest runners
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            & $iscc installer.iss
          } else {
            Write-Host "Inno Setup not found, skipping installer creation"
          }
      - name: Upload Windows EXE (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: TenderERP-Windows-${{ github.sha }}
          path: dist/TenderERP-Windows.zip
          if-no-files-found: error
          retention-days: 30
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        if: ${{ hashFiles('Output/TenderERP-Setup.exe') != '' }}
        with:
          name: TenderERP-Setup-${{ github.sha }}
          path: Output/TenderERP-Setup.exe
          if-no-files-found: warn
          retention-days: 30

  # ------------------------------------------------------------------
  # 3. macOS .app + DMG via PyInstaller
  # ------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean tender_erp.spec
      - name: Verify the .app bundle exists
        run: |
          test -d "dist/Tender ERP.app"
          ls -la "dist/Tender ERP.app/Contents"
      - name: Create DMG
        run: |
          hdiutil create -volname "Tender ERP" -srcfolder "dist/Tender ERP.app" -ov -format UDZO dist/TenderERP.dmg
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: TenderERP-macOS-${{ github.sha }}
          path: dist/TenderERP.dmg
          if-no-files-found: error
          retention-days: 30
