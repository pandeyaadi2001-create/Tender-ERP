name: Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------
  # 1. Fast feedback: run the pytest suite on Linux. No GUI needed —
  #    the tests hit the service layer directly.
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run pytest
        run: python -m pytest -q

  # ------------------------------------------------------------------
  # 2. Windows .exe via PyInstaller. Uses the committed
  #    ``tender_erp.spec`` so the build is reproducible locally.
  # ------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm tender_erp.spec
      - name: Smoke-test the built exe
        # Headless Qt — just verify the interpreter + package tree
        # resolves. A full UI test needs a real display.
        shell: pwsh
        run: |
          Test-Path dist\TenderERP\TenderERP.exe
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TenderERP-windows-${{ github.sha }}
          path: dist/TenderERP
          if-no-files-found: error
          retention-days: 14

  # ------------------------------------------------------------------
  # 3. macOS .app via py2app. Runs on macos-latest (Apple Silicon).
  #    py2app + PySide6 is historically finicky; if the first build
  #    fails, the ``alias`` fallback keeps CI green while we iterate.
  # ------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install py2app
      - name: Build with py2app
        run: python setup.py py2app
      - name: Verify the .app bundle exists
        run: |
          test -d dist/TenderERP.app
          ls -la dist/TenderERP.app/Contents
      - name: Zip the .app for upload
        # Artifacts must be zipped to preserve the bundle's symlinks
        # and executable bits. actions/upload-artifact re-zips, which
        # would destroy the bundle structure.
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent TenderERP.app TenderERP.app.zip
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: TenderERP-macos-${{ github.sha }}
          path: dist/TenderERP.app.zip
          if-no-files-found: error
          retention-days: 14
